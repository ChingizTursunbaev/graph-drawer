<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Sirt Grafigi — K = f(T, n)</title>
<script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Source+Sans+3:wght@400;600;700&display=swap');

  *{margin:0;padding:0;box-sizing:border-box}

  :root{
    --bg:#0e1117;
    --panel:#161b22;
    --border:#30363d;
    --text:#c9d1d9;
    --text-dim:#8b949e;
    --accent:#58a6ff;
    --accent2:#3fb950;
    --input-bg:#0d1117;
  }

  body{
    font-family:'Source Sans 3',sans-serif;
    background:var(--bg);
    color:var(--text);
    min-height:100vh;
  }

  header{
    padding:16px 24px 0;
    display:flex;
    align-items:baseline;
    gap:12px;
  }
  header h1{
    font-family:'JetBrains Mono',monospace;
    font-size:18px;
    font-weight:600;
    color:var(--accent);
    letter-spacing:-.3px;
  }
  header span{
    font-size:13px;
    color:var(--text-dim);
  }

  .controls{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    padding:14px 24px;
    background:var(--panel);
    border-bottom:1px solid var(--border);
    align-items:end;
  }

  .field{
    display:flex;
    flex-direction:column;
    gap:3px;
  }
  .field label{
    font-size:11px;
    font-weight:600;
    text-transform:uppercase;
    letter-spacing:.6px;
    color:var(--text-dim);
    font-family:'JetBrains Mono',monospace;
  }
  .field input, .field select{
    font-family:'JetBrains Mono',monospace;
    font-size:13px;
    padding:6px 10px;
    border:1px solid var(--border);
    border-radius:6px;
    background:var(--input-bg);
    color:var(--text);
    outline:none;
    width:100px;
    transition:border-color .15s;
  }
  .field select{width:90px}
  .field input:focus, .field select:focus{
    border-color:var(--accent);
  }

  .sep{
    width:1px;
    height:36px;
    background:var(--border);
    align-self:end;
    margin-bottom:2px;
  }

  button#draw{
    font-family:'JetBrains Mono',monospace;
    font-size:13px;
    font-weight:600;
    padding:7px 20px;
    border:none;
    border-radius:6px;
    background:var(--accent);
    color:#0e1117;
    cursor:pointer;
    letter-spacing:.3px;
    transition:background .15s;
  }
  button#draw:hover{background:#79c0ff}

  #plot{
    width:100%;
    height:calc(100vh - 120px);
    min-height:500px;
  }
</style>
</head>
<body>

<header>
  <h1>K = f(T, n)</h1>
  <span>3D sirt grafigi</span>
</header>

<div class="controls">
  <!-- T -->
  <div class="field">
    <label>T min</label>
    <input type="number" id="tMin" value="1" step="any">
  </div>
  <div class="field">
    <label>T max</label>
    <input type="number" id="tMax" value="25" step="any">
  </div>
  <div class="field">
    <label>T birligi</label>
    <select id="tUnit">
      <option value="kH" selected>kH</option>
      <option value="H">H</option>
    </select>
  </div>

  <div class="sep"></div>

  <!-- n -->
  <div class="field">
    <label>n min</label>
    <input type="number" id="nMin" value="1" step="any">
  </div>
  <div class="field">
    <label>n max</label>
    <input type="number" id="nMax" value="30" step="any">
  </div>
  <div class="field">
    <label>n birligi</label>
    <select id="nUnit">
      <option value="rpm" selected>rpm</option>
      <option value="krpm">krpm</option>
    </select>
  </div>

  <div class="sep"></div>

  <!-- K -->
  <div class="field">
    <label>K birligi</label>
    <select id="kUnit">
      <option value="mg">mg</option>
      <option value="g">g</option>
      <option value="kg" selected>kg</option>
      <option value="t">t</option>
    </select>
  </div>

  <div class="sep"></div>

  <!-- Grid -->
  <div class="field">
    <label>Nuqtalar</label>
    <input type="number" id="gridN" value="40" min="5" max="200" step="1">
  </div>

  <button id="draw">Chizish</button>
</div>

<div id="plot"></div>

<script>
/* ===== Birlik konvertatsiya ===== */

// Foydalanuvchi birligidan bazaviy birlikka (T→kH, n→rpm, K→kg)
function toBase(value, unit) {
  switch (unit) {
    case 'kH':   return value;           // already kH
    case 'H':    return value / 1000;    // H → kH
    case 'rpm':  return value;           // already rpm
    case 'krpm': return value * 1000;    // krpm → rpm
    case 'mg':   return value / 1e6;     // mg → kg
    case 'g':    return value / 1000;    // g → kg
    case 'kg':   return value;           // already kg
    case 't':    return value * 1000;    // t → kg
    default:     return value;
  }
}

// Bazaviy birlikdan foydalanuvchi birligiga
function fromBase(value, unit) {
  switch (unit) {
    case 'kH':   return value;
    case 'H':    return value * 1000;
    case 'rpm':  return value;
    case 'krpm': return value / 1000;
    case 'mg':   return value * 1e6;
    case 'g':    return value * 1000;
    case 'kg':   return value;
    case 't':    return value / 1000;
    default:     return value;
  }
}

/* ===== Asosiy hisoblash funksiyasi =====
   T bazaviy birlikda (kH), n bazaviy birlikda (rpm).
   Natija kg da qaytariladi.
   *** Shu funksiyani o'zingiz o'zgartiring *** */
function computeK(T_kH, n_rpm) {
  // Namuna: K = 0.04 * T^0.35 * n^0.25 + 0.5 * sin(T/5) * cos(n/8)
  return 0.04 * Math.pow(T_kH, 0.35) * Math.pow(n_rpm, 0.25)
       + 0.5 * Math.sin(T_kH / 5) * Math.cos(n_rpm / 8);
}

/* ===== Grafikni chizish ===== */
function render() {
  const tUnit = document.getElementById('tUnit').value;
  const nUnit = document.getElementById('nUnit').value;
  const kUnit = document.getElementById('kUnit').value;

  const tMinUser = parseFloat(document.getElementById('tMin').value);
  const tMaxUser = parseFloat(document.getElementById('tMax').value);
  const nMinUser = parseFloat(document.getElementById('nMin').value);
  const nMaxUser = parseFloat(document.getElementById('nMax').value);
  const gridN   = parseInt(document.getElementById('gridN').value) || 40;

  // Bazaviy birlikka o'tkazish
  const tMinBase = toBase(tMinUser, tUnit);
  const tMaxBase = toBase(tMaxUser, tUnit);
  const nMinBase = toBase(nMinUser, nUnit);
  const nMaxBase = toBase(nMaxUser, nUnit);

  const tStep = (tMaxBase - tMinBase) / (gridN - 1);
  const nStep = (nMaxBase - nMinBase) / (gridN - 1);

  // Display qiymatlari uchun massivlar
  const tDisplay = [];
  const nDisplay = [];
  const kDisplay = [];

  for (let i = 0; i < gridN; i++) {
    const T_base = tMinBase + i * tStep;
    tDisplay.push(fromBase(T_base, tUnit));
  }

  for (let j = 0; j < gridN; j++) {
    const n_base = nMinBase + j * nStep;
    nDisplay.push(fromBase(n_base, nUnit));
  }

  for (let j = 0; j < gridN; j++) {
    const row = [];
    const n_base = nMinBase + j * nStep;
    for (let i = 0; i < gridN; i++) {
      const T_base = tMinBase + i * tStep;
      const K_base = computeK(T_base, n_base);
      row.push(fromBase(K_base, kUnit));
    }
    kDisplay.push(row);
  }

  const trace = {
    x: tDisplay,
    y: nDisplay,
    z: kDisplay,
    type: 'surface',
    colorscale: 'Rainbow',
    colorbar: {
      title: { text: 'K, ' + kUnit, font: { family: 'JetBrains Mono', size: 12, color: '#c9d1d9' } },
      tickfont: { family: 'JetBrains Mono', size: 10, color: '#8b949e' },
      outlinewidth: 0,
      bgcolor: 'rgba(0,0,0,0)',
    },
    contours: {
      z: { show: true, usecolormap: true, highlightcolor: '#fff', project: { z: false } }
    },
    lighting: { ambient: 0.6, diffuse: 0.7, specular: 0.3, roughness: 0.5 },
  };

  const layout = {
    paper_bgcolor: '#0e1117',
    font: { family: 'JetBrains Mono', color: '#c9d1d9' },
    margin: { l: 10, r: 10, t: 10, b: 10 },
    scene: {
      xaxis: {
        title: { text: 'T, ' + tUnit, font: { size: 13 } },
        gridcolor: '#30363d',
        zerolinecolor: '#484f58',
        tickfont: { size: 10, color: '#8b949e' },
        backgroundcolor: '#161b22',
      },
      yaxis: {
        title: { text: 'n, ' + nUnit, font: { size: 13 } },
        gridcolor: '#30363d',
        zerolinecolor: '#484f58',
        tickfont: { size: 10, color: '#8b949e' },
        backgroundcolor: '#161b22',
      },
      zaxis: {
        title: { text: 'K, ' + kUnit, font: { size: 13 } },
        gridcolor: '#30363d',
        zerolinecolor: '#484f58',
        tickfont: { size: 10, color: '#8b949e' },
        backgroundcolor: '#161b22',
      },
      camera: { eye: { x: 1.6, y: -1.8, z: 0.9 } },
    },
  };

  Plotly.react('plot', [trace], layout, { responsive: true });
}

document.getElementById('draw').addEventListener('click', render);
window.addEventListener('load', render);
</script>
</body>
</html>
